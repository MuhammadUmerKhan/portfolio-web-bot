services:
  - type: web
    name: portfolio-bot
    env: docker
    plan: free
    region: ohio # Adjust if you have a preferred US region
    healthCheckPath: /health
    envVars:
      - key: PORT # Render assigns this automatically, but FastAPI needs to read it
        value: 8000
      - key: GROQ_API_KEY
        sync: false # Set manually in the Render Dashboard
      - key: PORTKEY_API_KEY
        sync: false # Set manually in the Render Dashboard
      - key: QDRANT_URL
        sync: false # Set manually in the Render Dashboard
      - key: QDRANT_API_KEY
        sync: false # Set manually in the Render Dashboard
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false # Set manually in the Render Dashboard
      - key: LANGCHAIN_PROJECT
        value: "portfolio-web-bot-prod"

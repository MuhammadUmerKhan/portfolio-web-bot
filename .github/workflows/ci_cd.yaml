name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev/prod
  pull_request:
    branches:
      - main

jobs:
  evaluate:
    name: Run Evaluation Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Evals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JUDGE_GROQ: ${{ secrets.JUDGE_GROQ }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          PYTHONPATH: .
        run: uv run python scripts/run_evals.py

  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/prod'
    steps:
      - name: Call Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set, skipping deployment."
            exit 0
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev/prod
  pull_request:
    branches:
      - main

jobs:
  evaluate:
    name: Run Evaluation Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Evals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JUDGE_GROQ: ${{ secrets.JUDGE_GROQ }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_END_POINT: ${{ secrets.QDRANT_END_POINT }}
          QDRANT_CLUSTER_ID: ${{ secrets.QDRANT_CLUSTER_ID }}
          PORTKEY_CONFIG: ${{ secrets.PORTKEY_CONFIG }}
          GROQ_SLUG: "portfolio-bot"
          GROQ_SLUG_2: "portfolio-bot-2"
          OPENROUTER_API_KEY: "dummy"
          GITHUB_TOKEN: "dummy"
          PYTHONPATH: .
        run: uv run python scripts/run_evals.py
